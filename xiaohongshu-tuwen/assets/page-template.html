<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小红书图文模板</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="xhs-page page-cover">
      <header class="page-header">
        <div class="page-kicker">Tech Brief</div>
        <div class="page-author"></div>
      </header>

      <section data-block>
        <h1 class="page-title">
          Hermes Agent，<br />
          下一个 <span class="accent">OpenClaw</span>？
        </h1>
        <p class="page-subtitle">
          用一句判断带出整套轮播的核心问题，再用后续页面给出证据和拆解。
        </p>
      </section>

      <section class="page-body" data-block>
        <div class="section-title">核心信息</div>
        <div class="stat-grid">
          <article class="card stat-card">
            <p class="stat-label">GitHub 星标</p>
            <p class="stat-value">6.6万+</p>
            <p class="stat-note">增长更快，讨论热度更高</p>
          </article>
          <article class="card stat-card">
            <p class="stat-label">核心差异</p>
            <p class="stat-value">分层记忆</p>
            <p class="stat-note">原生支持，便于长期任务积累</p>
          </article>
        </div>
      </section>

      <footer class="page-footer">数据来源：GitHub、OpenRouter、项目官方</footer>
    </main>
  </body>
</html>
